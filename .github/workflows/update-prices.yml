name: Update flat prices

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest prices from unistroy.ru
        run: node scripts/fetch_unistroy_prices.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/output
          if ! git diff --cached --quiet; then
            git commit -m "Автообновление цен с unistroy.ru"
            git push
          else
            echo "No price changes, skipping commit."
          fi
